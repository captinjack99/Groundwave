name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    # A job that can't be scheduled (retired runner label) or hangs used to
    # pin the run open until GitHub's 24-hour kill — cap it hard.
    timeout-minutes: 45
    strategy:
      # Release and Debug are independent signals; don't cancel one
      # because the other failed.
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
            libopus-dev pkg-config qt6-base-dev qt6-base-private-dev \
            libgl1-mesa-dev

      - name: Configure
        run: cmake -B build -G Ninja
                   -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
                   -DBUILD_GUI=ON -DBUILD_TESTS=ON -DBUILD_CLI=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  build-windows:
    # Pin to windows-2022, NOT windows-latest: -latest moved to
    # windows-2025, where CMake's "Visual Studio 17 2022" generator finds
    # no VS instance. windows-2022 is the image that builds green.
    runs-on: windows-2022
    timeout-minutes: 45
    strategy:
      matrix:
        build_type: [Release]
    steps:
      - uses: actions/checkout@v4

      - name: Install vcpkg deps
        run: vcpkg install opus:x64-windows
        shell: pwsh

      - name: Setup Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64
                   -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
                   -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
                   -DBUILD_GUI=ON -DBUILD_TESTS=ON -DBUILD_CLI=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        working-directory: build
        run: ctest -C ${{ matrix.build_type }} --output-on-failure

  build-macos:
    # macos-13 was retired by GitHub: jobs requesting it were never
    # scheduled, which held every run open for the full 24-hour limit
    # (the failure signature on every pre-rename CI run). macos-latest is
    # arm64 (brew prefix /opt/homebrew). This platform has never built
    # green and is not on the release path (release.yml is Windows-only),
    # so it is non-blocking: it reports a signal without failing the run.
    # Remove continue-on-error once macOS is confirmed green.
    runs-on: macos-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install brew deps
        run: brew install opus qt@6 cmake ninja pkg-config

      - name: Configure
        # Brew's opus ships a pkg-config .pc, not a CMake config, and the
        # arm64 prefix isn't on the default search path — point both the
        # CMake prefix and PKG_CONFIG_PATH at it so opus/opus.h resolves.
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix opus)/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6);$(brew --prefix opus)" \
            -DBUILD_GUI=ON -DBUILD_TESTS=ON -DBUILD_CLI=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure
